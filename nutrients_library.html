<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DWC Nutrient Library — Multi-Brand Calculator</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --green-dim: #238636;
      --blue: #58a6ff;
      --orange: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
      --teal: #39d353;
      --accent: #1f6feb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo { font-size: 24px; }
    .header-title { font-size: 18px; font-weight: 700; color: var(--green); }
    .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .header-badge {
      margin-left: auto;
      background: var(--green-dim);
      color: var(--green);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    /* Brand tabs */
    .brand-nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
      display: flex;
      gap: 2px;
      padding: 8px 12px 0;
    }
    .brand-nav::-webkit-scrollbar { display: none; }
    .brand-tab {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 6px 6px 0 0;
      border: 1px solid transparent;
      border-bottom: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      transition: all 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .brand-tab:hover { color: var(--text); background: var(--surface2); }
    .brand-tab.active {
      color: var(--text);
      background: var(--bg);
      border-color: var(--border);
    }

    /* Controls */
    .controls {
      padding: 14px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ctrl-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      font-weight: 600;
    }
    .ctrl-row { display: flex; gap: 6px; align-items: center; }
    .phase-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .phase-btn:hover { color: var(--text); }
    .phase-btn.active-grow { background: #1a3d1f; border-color: var(--green); color: var(--green); }
    .phase-btn.active-bloom { background: #3d1a3d; border-color: var(--purple); color: var(--purple); }
    .phase-btn.active-flush { background: #1a2a3d; border-color: var(--blue); color: var(--blue); }

    .week-select, .volume-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 12px;
    }
    .volume-input { width: 80px; }
    .volume-unit { color: var(--muted); font-size: 12px; }

    /* Main layout */
    .main { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

    /* EC / Status bar */
    .status-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .status-card {
      flex: 1;
      min-width: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .status-card-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
    .status-card-value { font-size: 22px; font-weight: 700; margin-top: 2px; }
    .status-card-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .val-green { color: var(--green); }
    .val-blue { color: var(--blue); }
    .val-orange { color: var(--orange); }
    .val-purple { color: var(--purple); }

    /* Dosing table */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .section-header {
      padding: 10px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-header .pill {
      background: var(--border);
      color: var(--text);
      padding: 1px 8px;
      border-radius: 20px;
      font-size: 10px;
    }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 8px 12px;
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    td { padding: 10px 12px; }

    .product-name { font-weight: 600; color: var(--text); }
    .product-note { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .type-badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
    }
    .type-base { background: #1a3d1f; color: var(--green); }
    .type-root { background: #2d2000; color: #f0a500; }
    .type-vitamin { background: #1a2a3d; color: var(--blue); }
    .type-bloom { background: #3d1a3d; color: var(--purple); }
    .type-pk { background: #3d1a1a; color: var(--red); }
    .type-enzyme { background: #1a3d3d; color: var(--teal); }
    .type-silica { background: #2d2d1a; color: #e0e060; }
    .type-bacteria { background: #1a3d28; color: #60e090; }
    .type-carbs { background: #3d2d1a; color: #e0a060; }
    .type-flush { background: #1a2d3d; color: var(--blue); }
    .type-calmag { background: #2d1a3d; color: #c060e0; }

    .dose-cell {
      font-size: 16px;
      font-weight: 700;
      color: var(--green);
    }
    .dose-unit { font-size: 11px; color: var(--muted); margin-left: 2px; }
    .dose-base { font-size: 11px; color: var(--muted); }
    .dose-zero { color: var(--border); font-size: 13px; }

    /* Notes section */
    .notes-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    .notes-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    .note-item {
      display: flex;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .note-item:last-child { border-bottom: none; }
    .note-icon { flex-shrink: 0; width: 20px; text-align: center; }

    /* Flush overlay */
    .flush-overlay {
      text-align: center;
      padding: 40px 20px;
      color: var(--blue);
    }
    .flush-overlay .flush-icon { font-size: 48px; margin-bottom: 12px; }
    .flush-overlay .flush-title { font-size: 20px; font-weight: 700; }
    .flush-overlay .flush-sub { color: var(--muted); margin-top: 6px; font-size: 13px; }

    /* Order sequence */
    .order-sequence {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 12px 14px;
    }
    .order-step {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
    }
    .order-step-num {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .order-arrow { color: var(--border); font-size: 16px; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 11px;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }
    .footer a { color: var(--blue); text-decoration: none; }

    @media (max-width: 600px) {
      .controls { gap: 8px; }
      .status-card { min-width: 120px; }
      thead th:nth-child(3), td:nth-child(3) { display: none; }
    }
  </style>
</head>

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentBrand = 'hesi';
let currentPhase = 'grow';
let currentWeek  = 1;

// ─────────────────────────────────────────────
// INIT BRAND TABS
// ─────────────────────────────────────────────
function initBrandNav() {
  const nav = document.getElementById('brandNav');
  for (const [key, brand] of Object.entries(BRANDS)) {
    const tab = document.createElement('button');
    tab.className = 'brand-tab' + (key === currentBrand ? ' active' : '');
    tab.dataset.brand = key;
    tab.innerHTML = `${brand.emoji} ${brand.name}`;
    tab.onclick = () => setBrand(key);
    nav.appendChild(tab);
  }
}

function setBrand(key) {
  currentBrand = key;
  document.querySelectorAll('.brand-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.brand === key);
  });
  document.getElementById('brandBadge').textContent = BRANDS[key].name;
  render();
}

function setPhase(phase) {
  currentPhase = phase;
  const phases = ['grow','bloom','flush'];
  phases.forEach(p => {
    const btn = document.getElementById('btn-'+p);
    btn.className = 'phase-btn';
    if (p === phase) btn.classList.add('active-'+p);
  });
  // Update week options
  const sel = document.getElementById('weekSelect');
  if (phase === 'flush') {
    currentWeek = 1;
  } else {
    currentWeek = parseInt(sel.value) || 1;
  }
  render();
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  const brand  = BRANDS[currentBrand];
  const volume = parseFloat(document.getElementById('volumeInput').value) || 10;
  const week   = parseInt(document.getElementById('weekSelect').value) || 1;
  currentWeek  = week;

  const main = document.getElementById('mainContent');

  if (currentPhase === 'flush') {
    main.innerHTML = renderFlush(brand, volume);
    return;
  }

  const schedule = brand.schedule[currentPhase] || [];
  // Find week data — use closest week if exact not found
  let weekData = schedule.find(s => s.week === week);
  if (!weekData) {
    const available = schedule.filter(s => s.week <= week);
    weekData = available.length ? available[available.length-1] : schedule[0];
  }

  if (!weekData) {
    main.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)">Keine Daten für diese Phase/Woche</div>';
    return;
  }

  const factor = volume / 10;
  const allProducts = brand.products;
  const doses = weekData.doses || {};
  const addOrder = brand.addOrder[currentPhase] || [];

  // Status bar
  let statusHtml = `
    <div class="status-bar">
      <div class="status-card">
        <div class="status-card-label">EC Ziel</div>
        <div class="status-card-value val-green">${weekData.ec}</div>
        <div class="status-card-sub">mS/cm</div>
      </div>
      <div class="status-card">
        <div class="status-card-label">pH Ziel</div>
        <div class="status-card-value val-blue">5.8–6.2</div>
        <div class="status-card-sub">DWC Standard</div>
      </div>
      <div class="status-card">
        <div class="status-card-label">Tankvolumen</div>
        <div class="status-card-value val-orange">${volume}</div>
        <div class="status-card-sub">Liter</div>
      </div>
      <div class="status-card">
        <div class="status-card-label">Phase / Woche</div>
        <div class="status-card-value val-purple">${currentPhase === 'grow' ? '🌱' : '🌸'} W${week}</div>
        <div class="status-card-sub">${currentPhase === 'grow' ? 'Vegetation' : 'Blüte'}</div>
      </div>
    </div>`;

  if (weekData.note) {
    statusHtml += `<div style="background:#2d2000;border:1px solid #6e4c00;border-radius:8px;padding:10px 14px;font-size:12px;color:#f0a500;">⚠️ ${weekData.note}</div>`;
  }

  // Dosing table
  let rows = '';
  // Show active products first, then inactive ones
  const activeKeys = Object.keys(doses);
  const allKeys = Object.keys(allProducts);
  const inactiveKeys = allKeys.filter(k => !activeKeys.includes(k));
  const sortedKeys = [...activeKeys, ...inactiveKeys];

  for (const key of sortedKeys) {
    const prod = allProducts[key];
    if (!prod) continue;
    const baseml = doses[key] || 0;
    const calcml = +(baseml * factor).toFixed(1);
    const isActive = baseml > 0;
    const unit = prod.type === 'bloom' && key === 'shooting' ? 'g' : 'ml';

    rows += `
      <tr style="${!isActive ? 'opacity:0.35' : ''}">
        <td>
          <div class="product-name">${prod.name}</div>
          <div class="product-note">${prod.note}</div>
        </td>
        <td><span class="type-badge type-${prod.type}">${typeLabel(prod.type)}</span></td>
        <td>
          ${isActive
            ? `<span class="dose-base">${baseml} ${unit}/10L</span>`
            : `<span class="dose-zero">—</span>`}
        </td>
        <td>
          ${isActive
            ? `<span class="dose-cell">${calcml}<span class="dose-unit">${unit}</span></span>`
            : `<span class="dose-zero">nicht diese Woche</span>`}
        </td>
      </tr>`;
  }

  const tableHtml = `
    <div class="section">
      <div class="section-header">
        💊 Nährstoff-Dosierung <span class="pill">${brand.name}</span><span class="pill">${currentPhase === 'grow' ? 'Grow' : 'Bloom'} Wk ${week}</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Produkt</th>
            <th>Typ</th>
            <th>Basis (10L)</th>
            <th>Für ${volume}L</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  // Add order
  let orderSteps = '';
  const orderProducts = addOrder.filter(k => doses[k]);
  if (orderProducts.length > 0) {
    orderProducts.forEach((key, i) => {
      const prod = allProducts[key];
      if (!prod) return;
      orderSteps += `
        <div class="order-step">
          <div class="order-step-num">${i+1}</div>
          ${prod.name}
        </div>`;
      if (i < orderProducts.length - 1) {
        orderSteps += `<div class="order-arrow">→</div>`;
      }
    });
    // pH last
    orderSteps += `<div class="order-arrow">→</div><div class="order-step"><div class="order-step-num" style="background:#1f6feb">pH</div> pH einstellen</div>`;
  }

  const orderHtml = orderSteps ? `
    <div class="section">
      <div class="section-header">📋 Zugabereihenfolge</div>
      <div class="order-sequence">${orderSteps}</div>
    </div>` : '';

  // Tips
  const tips = brand.tips || [];
  let tipRows = tips.map(t => `
    <div class="note-item">
      <span class="note-icon">${t.icon}</span>
      <span>${t.text}</span>
    </div>`).join('');

  const tipsHtml = tipRows ? `
    <div class="notes-box">
      <div class="notes-title">💡 Tipps — ${brand.name}</div>
      ${tipRows}
    </div>` : '';

  main.innerHTML = statusHtml + tableHtml + orderHtml + tipsHtml;
}

function renderFlush(brand, volume) {
  return `
    <div class="section">
      <div class="flush-overlay">
        <div class="flush-icon">💧</div>
        <div class="flush-title">Flush Phase</div>
        <div class="flush-sub">Reines Wasser — keine Nährstoffe<br>
          EC Ziel: 0.3–0.5 mS/cm &nbsp;|&nbsp; pH: 6.0–6.2</div>
        <div style="margin-top:20px;color:var(--muted);font-size:13px">
          ${brand.name === 'BioBizz'
            ? '🌿 <strong>BioBizz:</strong> 2 Wochen Flush empfohlen — organische Reste brauchen länger'
            : '⏱️ Standard Flush: 1–2 Wochen vor der Ernte'}
        </div>
        <div style="margin-top:12px;background:var(--surface2);border-radius:8px;padding:12px;display:inline-block;text-align:left;font-size:12px;color:var(--text)">
          🪣 <strong>${volume}L Tank:</strong> ${volume}L frisches Wasser + pH-Korrektur auf 6.0–6.2<br>
          📉 Tägliche EC-Kontrolle — soll weiter sinken<br>
          🔄 Wasserwechsel alle 3–5 Tage mit reinem Wasser
        </div>
      </div>
    </div>
    <div class="notes-box">
      <div class="notes-title">🏁 Flush-Checkliste</div>
      <div class="note-item"><span class="note-icon">1️⃣</span><span>Alle Nährstoffe stoppen — nur noch reines Wasser</span></div>
      <div class="note-item"><span class="note-icon">2️⃣</span><span>Trichome mit Lupe prüfen: milchig = bald; bernsteinfarben = voll reif</span></div>
      <div class="note-item"><span class="note-icon">3️⃣</span><span>Blätter werden gelb — das ist normal und erwünscht</span></div>
      <div class="note-item"><span class="note-icon">4️⃣</span><span>pH täglich prüfen und auf 6.0–6.2 halten</span></div>
      <div class="note-item"><span class="note-icon">5️⃣</span><span>48h Dunkelheit vor Ernte optional — für Terpen-Boost</span></div>
    </div>`;
}

function typeLabel(type) {
  const labels = {
    base:'Basis', root:'Wurzel', vitamin:'Vitamin', bloom:'Bloom',
    pk:'PK-Boost', enzyme:'Enzym', silica:'Silika', bacteria:'Bakterien',
    carbs:'Carbs', flush:'Flush', calmag:'CaMag'
  };
  return labels[type] || type;
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
initBrandNav();
render();
</script>
</body>
