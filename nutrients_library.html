<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DWC Nutrient Library — 13-brand hydroponics dosing calculator. Full weekly schedules for Grow/Bloom/Flush with volume calculator. 100% local.">
  <meta name="theme-color" content="#0d1117">
  <title>DWC Nutrient Library — Multi-Brand Calculator</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --green-dim: #238636;
      --blue: #58a6ff;
      --orange: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
      --teal: #39d353;
      --accent: #1f6feb;
    }

    body.light-mode {
      --bg: #f6f8fa;
      --surface: #ffffff;
      --surface2: #f0f3f6;
      --border: #d0d7de;
      --text: #1f2328;
      --muted: #636e7b;
      --green: #1a7f37;
      --green-dim: #dafbe1;
      --blue: #0969da;
      --orange: #9a6700;
      --red: #cf222e;
      --purple: #8250df;
      --teal: #116329;
      --accent: #0969da;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
    }
    .header-logo { font-size: 22px; flex-shrink: 0; }
    .header-info { flex: 1; min-width: 0; }
    .header-title { font-size: 17px; font-weight: 700; color: var(--green); }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .header-badge {
      background: var(--green-dim);
      color: var(--green);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .header-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .ctrl-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .ctrl-btn:hover { border-color: var(--green); color: var(--green); }
    #lang-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 7px;
      border-radius: 8px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    #lang-select:hover { border-color: var(--green); color: var(--green); }

    /* Brand tabs */
    .brand-nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
      display: flex;
      gap: 2px;
      padding: 8px 12px 0;
    }
    .brand-nav::-webkit-scrollbar { display: none; }
    .brand-tab {
      flex-shrink: 0;
      padding: 8px 13px;
      border-radius: 6px 6px 0 0;
      border: 1px solid transparent;
      border-bottom: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      transition: all 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .brand-tab:hover { color: var(--text); background: var(--surface2); }
    .brand-tab.active { color: var(--text); background: var(--bg); border-color: var(--border); }

    /* Controls */
    .controls {
      padding: 12px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .ctrl-group { display: flex; flex-direction: column; gap: 4px; }
    .ctrl-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      font-weight: 600;
    }
    .ctrl-row { display: flex; gap: 6px; align-items: center; }
    .phase-btn {
      padding: 6px 13px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .phase-btn:hover { color: var(--text); }
    .phase-btn.active-grow { background: #1a3d1f; border-color: var(--green); color: var(--green); }
    .phase-btn.active-bloom { background: #3d1a3d; border-color: var(--purple); color: var(--purple); }
    .phase-btn.active-flush { background: #1a2a3d; border-color: var(--blue); color: var(--blue); }
    body.light-mode .phase-btn.active-grow { background: #dafbe1; }
    body.light-mode .phase-btn.active-bloom { background: #fbefff; }
    body.light-mode .phase-btn.active-flush { background: #ddf4ff; }

    .week-select, .volume-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 12px;
    }
    .volume-input { width: 80px; }
    .volume-unit { color: var(--muted); font-size: 12px; }

    /* Main layout */
    .main { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

    /* Status bar */
    .status-bar { display: flex; gap: 12px; flex-wrap: wrap; }
    .status-card {
      flex: 1;
      min-width: 130px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .status-card-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
    .status-card-value { font-size: 22px; font-weight: 700; margin-top: 2px; }
    .status-card-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .val-green { color: var(--green); }
    .val-blue { color: var(--blue); }
    .val-orange { color: var(--orange); }
    .val-purple { color: var(--purple); }

    /* Dosing table */
    .section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .section-header {
      padding: 10px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-header .pill {
      background: var(--border);
      color: var(--text);
      padding: 1px 8px;
      border-radius: 20px;
      font-size: 10px;
      text-transform: none;
      letter-spacing: 0;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 8px 12px;
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    td { padding: 10px 12px; }
    .product-name { font-weight: 600; color: var(--text); }
    .product-note { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .type-badge { display: inline-block; padding: 1px 7px; border-radius: 20px; font-size: 10px; font-weight: 600; }
    .type-base     { background:#1a3d1f; color:var(--green); }
    .type-root     { background:#2d2000; color:#f0a500; }
    .type-vitamin  { background:#1a2a3d; color:var(--blue); }
    .type-bloom    { background:#3d1a3d; color:var(--purple); }
    .type-pk       { background:#3d1a1a; color:var(--red); }
    .type-enzyme   { background:#1a3d3d; color:var(--teal); }
    .type-silica   { background:#2d2d1a; color:#e0e060; }
    .type-bacteria { background:#1a3d28; color:#60e090; }
    .type-carbs    { background:#3d2d1a; color:#e0a060; }
    .type-flush    { background:#1a2d3d; color:var(--blue); }
    .type-calmag   { background:#2d1a3d; color:#c060e0; }
    body.light-mode .type-base     { background:#dafbe1; color:var(--green); }
    body.light-mode .type-root     { background:#fff3cd; color:#7d5a00; }
    body.light-mode .type-vitamin  { background:#ddf4ff; color:var(--blue); }
    body.light-mode .type-bloom    { background:#fbefff; color:var(--purple); }
    body.light-mode .type-pk       { background:#ffebe9; color:var(--red); }
    body.light-mode .type-enzyme   { background:#dcfce7; color:var(--teal); }
    body.light-mode .type-silica   { background:#fef9c3; color:#5c4a00; }
    body.light-mode .type-bacteria { background:#d1fae5; color:#065f46; }
    body.light-mode .type-carbs    { background:#fef3c7; color:#92400e; }
    body.light-mode .type-flush    { background:#eff6ff; color:var(--blue); }
    body.light-mode .type-calmag   { background:#f5f3ff; color:var(--purple); }

    .dose-cell { font-size: 16px; font-weight: 700; color: var(--green); }
    .dose-unit { font-size: 11px; color: var(--muted); margin-left: 2px; }
    .dose-base { font-size: 11px; color: var(--muted); }
    .dose-zero { color: var(--border); font-size: 13px; }

    /* Notes / Tips */
    .notes-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
    .notes-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    .note-item { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .note-item:last-child { border-bottom: none; }
    .note-icon { flex-shrink: 0; width: 20px; text-align: center; }

    /* Flush overlay */
    .flush-overlay { text-align: center; padding: 40px 20px; color: var(--blue); }
    .flush-overlay .flush-icon { font-size: 48px; margin-bottom: 12px; }
    .flush-overlay .flush-title { font-size: 20px; font-weight: 700; }
    .flush-overlay .flush-sub { color: var(--muted); margin-top: 6px; font-size: 13px; }

    /* Add order */
    .order-sequence { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 14px; }
    .order-step {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
    }
    .order-step-num {
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--accent); color: white;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .order-arrow { color: var(--border); font-size: 16px; }

    /* Week note — adapts to dark/light */
    .week-note {
      background: var(--week-note-bg, #2d2000);
      border: 1px solid var(--week-note-border, #6e4c00);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--week-note-color, #f0a500);
    }
    body.light-mode .week-note {
      --week-note-bg: #fff8e1;
      --week-note-border: #f59e0b;
      --week-note-color: #92400e;
    }

    /* Footer */
    .footer {
      text-align: center; padding: 20px;
      color: var(--muted); font-size: 11px;
      border-top: 1px solid var(--border); margin-top: 16px;
    }
    .footer a { color: var(--blue); text-decoration: none; }

    @media (max-width: 680px) {
      .controls { gap: 8px; }
      .status-card { min-width: 110px; }
      thead th:nth-child(3), td:nth-child(3) { display: none; }
      .header-controls { gap: 4px; }
      .ctrl-btn { padding: 4px 7px; }
    }
  </style>
</head>

<div class="header">

  </div>
  <div class="header-controls">

      <option value="de">🇩🇪 DE</option>
      <option value="en">🇬🇧 EN</option>
      <option value="it">🇮🇹 IT</option>
      <option value="fr">🇫🇷 FR</option>
      <option value="es">🇪🇸 ES</option>
      <option value="pt">🇵🇹 PT</option>
    </select>
    <button class="ctrl-btn" id="theme-btn" onclick="toggleDarkLight()" title="Dark/Light">🌙</button>
    <a href="index.html" class="ctrl-btn" id="back-btn">← DWC Grower</a>
    <div class="header-badge" id="brandBadge">Hesi</div>
  </div>
</div>

<div class="brand-nav" id="brandNav"></div>

<div class="controls">

      <button class="phase-btn" onclick="setPhase('flush')" id="btn-flush">💧 Flush</button>
    </div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label" id="lbl-week">Woche</div>
    <div class="ctrl-row">
      <select class="week-select" id="weekSelect" onchange="render()">
        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
        <option value="7">7</option><option value="8">8</option>
      </select>
    </div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label" id="lbl-volume">Tank Volumen</div>
    <div class="ctrl-row">
      <input class="volume-input" type="number" id="volumeInput" inputmode="decimal" value="20" min="1" max="500" oninput="render()">
      <span class="volume-unit" id="lbl-liter">Liter</span>
    </div>
  </div>
</div>

<div class="main" id="mainContent"></div>

<div class="footer">
  <a href="index.html" id="footer-back">← DWC Grower Edition</a> &nbsp;|&nbsp;

</div>

let T = LANGS.de;
let currentLang = 'de';

function setLanguage(lang) {
  currentLang = lang;
  T = LANGS[lang];
  localStorage.setItem('nl-lang', lang);
  document.documentElement.lang = lang;
  document.getElementById('headerSub').textContent = T.header_sub;
  document.getElementById('back-btn').textContent = T.back_btn;
  document.getElementById('footer-back').textContent = T.back_btn;
  document.getElementById('lbl-phase').textContent = T.ctrl_phase;
  document.getElementById('lbl-week').textContent = T.ctrl_week;
  document.getElementById('lbl-volume').textContent = T.ctrl_volume;
  document.getElementById('lbl-liter').textContent = T.liter;
  document.getElementById('footer-note').textContent = T.footer_note;
  document.getElementById('lang-select').value = lang;
  render();
}

function toggleDarkLight() {
  const isLight = document.body.classList.toggle('light-mode');
  document.getElementById('theme-btn').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('nl-theme', isLight ? 'light' : 'dark');
}

        { week:4, doses:{ bioGrow:12, fishMix:2, algamic:1 }, ec:1.5 },
        { week:5, doses:{ bioGrow:12, fishMix:2, algamic:1 }, ec:1.5 },
        { week:6, doses:{ bioGrow:12, fishMix:2 }, ec:1.5 },
        { week:7, doses:{ bioGrow:12, fishMix:2 }, ec:1.5 },
        { week:8, doses:{ bioGrow:10, fishMix:1 }, ec:1.4 },
      ],
      bloom:[
        { week:1, doses:{ bioGrow:5,  bioBloom:10, topMax:4, algamic:1 }, ec:1.5 },
        { week:2, doses:{ bioBloom:12, topMax:4, algamic:1 }, ec:1.7 },
        { week:3, doses:{ bioBloom:15, topMax:6, algamic:1 }, ec:1.8 },
        { week:4, doses:{ bioBloom:15, topMax:6, algamic:1 }, ec:1.9 },
        { week:5, doses:{ bioBloom:20, topMax:6, calmag:1 }, ec:2.0 },
        { week:6, doses:{ bioBloom:20, topMax:4 }, ec:2.0 },
      ],
    },
    addOrder:{
      grow:["rootJuice","bioGrow","fishMix","algamic","calmag"],
      bloom:["rootJuice","bioGrow","bioBloom","fishMix","topMax","algamic","calmag"]
    },
    tips:[
      { icon:"🌿", text:"BioBizz: vollständig organisch — fördert Mikrobenleben im Root-Zone" },
      { icon:"⚠️", text:"Bio-Nährstoffe: EC-Werte niedriger als synthetisch — Pflanzen können weniger aufnehmen" },
      { icon:"🌊", text:"Flush: 2 Wochen bei BioBizz empfohlen — organische Reste brauchen länger" },
      { icon:"🦠", text:"Root·Juice enthält lebende Mikroben — bei <20°C Wassertemperatur zugeben" },
    ]
  },

}; // end BRANDS

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentBrand = 'hesi';
let currentPhase = 'grow';
let currentWeek  = 1;

// ─────────────────────────────────────────────
// BRAND TABS
// ─────────────────────────────────────────────
function initBrandNav() {
  const nav = document.getElementById('brandNav');
  nav.innerHTML = '';
  for (const [key, brand] of Object.entries(BRANDS)) {
    const tab = document.createElement('button');
    tab.className = 'brand-tab' + (key === currentBrand ? ' active' : '');
    tab.dataset.brand = key;
    tab.innerHTML = `${brand.emoji} ${brand.name}`;
    tab.onclick = () => setBrand(key);
    nav.appendChild(tab);
  }
}

function updateWeekSelect() {
  const schedule = BRANDS[currentBrand].schedule[currentPhase];
  const maxWeek  = schedule ? Math.max(...schedule.map(s => s.week)) : 8;
  const sel      = document.getElementById('weekSelect');
  const curVal   = parseInt(sel.value) || 1;
  sel.innerHTML  = '';
  for (let i = 1; i <= maxWeek; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = i;
    sel.appendChild(opt);
  }
  // Clamp current week to max
  sel.value  = Math.min(curVal, maxWeek);
  currentWeek = parseInt(sel.value);
}

function setBrand(key) {
  currentBrand = key;
  document.querySelectorAll('.brand-tab').forEach(t => t.classList.toggle('active', t.dataset.brand === key));
  document.getElementById('brandBadge').textContent = BRANDS[key].name;
  localStorage.setItem('nl-brand', key);
  updateWeekSelect();
  render();
}

function setPhase(phase) {
  currentPhase = phase;
  ['grow','bloom','flush'].forEach(p => {
    const btn = document.getElementById('btn-'+p);
    btn.className = 'phase-btn';
    if (p === phase) btn.classList.add('active-'+p);
  });
  localStorage.setItem('nl-phase', phase);
  updateWeekSelect();
  render();
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  const brand  = BRANDS[currentBrand];
  const volume = Math.max(1, parseFloat(document.getElementById('volumeInput').value) || 10);
  const week   = parseInt(document.getElementById('weekSelect').value) || 1;
  currentWeek  = week;
  localStorage.setItem('nl-week', week);
  localStorage.setItem('nl-volume', volume);
  const main   = document.getElementById('mainContent');

  if (currentPhase === 'flush') {
    main.innerHTML = renderFlush(brand, volume);
    return;
  }

  const schedule = brand.schedule[currentPhase] || [];
  let weekData = schedule.find(s => s.week === week);
  if (!weekData) {
    const avail = schedule.filter(s => s.week <= week);
    weekData = avail.length ? avail[avail.length-1] : schedule[0];
  }
  if (!weekData) {
    main.innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted)">${T.no_data}</div>`;
    return;
  }

  const factor      = volume / 10;
  const allProducts = brand.products;
  const doses       = weekData.doses || {};
  const addOrder    = brand.addOrder[currentPhase] || [];

  // Status bar
  const phaseEmoji = currentPhase === 'grow' ? '🌱' : '🌸';
  const phaseWord  = currentPhase === 'grow' ? T.veg : T.bloom_word;
  let html = `
    <div class="status-bar">
      <div class="status-card">
        <div class="status-card-label">${T.ec_target}</div>
        <div class="status-card-value val-green">${weekData.ec}</div>
        <div class="status-card-sub">${T.ec_unit}</div>
      </div>
      <div class="status-card">
        <div class="status-card-label">${T.ph_target}</div>
        <div class="status-card-value val-blue">5.8–6.2</div>
        <div class="status-card-sub">${T.ph_std}</div>
      </div>
      <div class="status-card">
        <div class="status-card-label">${T.tank_vol}</div>
        <div class="status-card-value val-orange">${volume}</div>
        <div class="status-card-sub">${T.liter}</div>
      </div>
      <div class="status-card">
        <div class="status-card-label">${T.phase_week}</div>
        <div class="status-card-value val-purple">${phaseEmoji} W${week}</div>
        <div class="status-card-sub">${phaseWord}</div>
      </div>
    </div>`;

  if (weekData.note) {
    html += `<div class="week-note">⚠️ ${weekData.note}</div>`;
  }

  // Dosing table
  const activeKeys   = Object.keys(doses);
  const inactiveKeys = Object.keys(allProducts).filter(k => !activeKeys.includes(k));
  let rows = '';
  for (const key of [...activeKeys, ...inactiveKeys]) {
    const prod   = allProducts[key];
    if (!prod) continue;
    const baseml = doses[key] || 0;
    const calcml = +(baseml * factor).toFixed(1);
    const isActive = baseml > 0;
    const unit   = (key === 'shooting') ? 'g' : 'ml';
    rows += `
      <tr style="${!isActive ? 'opacity:0.35' : ''}">
        <td>
          <div class="product-name">${prod.name}</div>
          <div class="product-note">${prod.note}</div>
        </td>
        <td><span class="type-badge type-${prod.type}">${typeLabel(prod.type)}</span></td>
        <td>${isActive ? `<span class="dose-base">${baseml} ${unit}/10L</span>` : `<span class="dose-zero">—</span>`}</td>
        <td>${isActive
          ? `<span class="dose-cell">${calcml}<span class="dose-unit">${unit}</span></span>`
          : `<span class="dose-zero">${T.not_this_week}</span>`}</td>
      </tr>`;
  }

  html += `
    <div class="section">
      <div class="section-header">
        ${T.dosing_header}
        <span class="pill">${brand.name}</span>
        <span class="pill">${currentPhase === 'grow' ? 'Grow' : 'Bloom'} Wk ${week}</span>
      </div>
      <table>
        <thead><tr>
          <th>${T.col_product}</th><th>${T.col_type}</th>
          <th>${T.col_base}</th><th>${T.col_for(volume)}</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  // Add order
  const orderProducts = addOrder.filter(k => doses[k]);
  if (orderProducts.length) {
    let steps = '';
    orderProducts.forEach((key, i) => {
      const prod = allProducts[key];
      if (!prod) return;
      steps += `<div class="order-step"><div class="order-step-num">${i+1}</div>${prod.name}</div>`;
      if (i < orderProducts.length - 1) steps += `<div class="order-arrow">→</div>`;
    });
    steps += `<div class="order-arrow">→</div><div class="order-step"><div class="order-step-num" style="background:#1f6feb">pH</div>${T.add_ph}</div>`;
    html += `<div class="section"><div class="section-header">${T.add_order}</div><div class="order-sequence">${steps}</div></div>`;
  }

  // Tips
  const tips = brand.tips || [];
  if (tips.length) {
    const tipRows = tips.map(t => `<div class="note-item"><span class="note-icon">${t.icon}</span><span>${t.text}</span></div>`).join('');
    html += `<div class="notes-box"><div class="notes-title">${T.tips_title(brand.name)}</div>${tipRows}</div>`;
  }

  main.innerHTML = html;
}

function renderFlush(brand, volume) {
  const specific = brand.name === 'BioBizz' ? T.biobizz_flush : T.std_flush;

  // Show brand-specific flush products if available
  const flushProds = Object.entries(brand.products || {})
    .filter(([, prod]) => prod.type === 'flush');
  let flushProdHtml = '';
  if (flushProds.length > 0) {
    const rows = flushProds.map(([, prod]) => `
      <tr>
        <td>
          <div class="product-name">${prod.name}</div>
          <div class="product-note">${prod.note}</div>
        </td>
        <td><span class="type-badge type-flush">${typeLabel('flush')}</span></td>
        <td><span class="dose-base">— ${T.flush_see_label}</span></td>
      </tr>`).join('');
    flushProdHtml = `
      <div class="section" style="margin-top:16px">
        <table class="dose-table">
          <thead><tr>
            <th>${T.col_product}</th>
            <th>${T.col_type}</th>
            <th>${T.col_base}</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  return `
    <div class="section">
      <div class="flush-overlay">
        <div class="flush-icon">💧</div>
        <div class="flush-title">${T.flush_title}</div>
        <div class="flush-sub">${T.flush_sub}<br>${T.flush_ec} &nbsp;|&nbsp; ${T.flush_ph}</div>
        <div style="margin-top:20px;color:var(--muted);font-size:13px">${specific}</div>
        <div style="margin-top:12px;background:var(--surface2);border-radius:8px;padding:12px;display:inline-block;text-align:left;font-size:12px;color:var(--text)">
          🪣 <strong>${volume}L Tank:</strong> ${T.flush_tank(volume)}<br>
          📉 ${T.flush_ec_check}<br>
          🔄 ${T.flush_change}
        </div>
      </div>
    </div>
    ${flushProdHtml}
    <div class="notes-box">
      <div class="notes-title">${T.flush_checklist}</div>
      <div class="note-item"><span class="note-icon">1️⃣</span><span>${T.flush_1}</span></div>
      <div class="note-item"><span class="note-icon">2️⃣</span><span>${T.flush_2}</span></div>
      <div class="note-item"><span class="note-icon">3️⃣</span><span>${T.flush_3}</span></div>
      <div class="note-item"><span class="note-icon">4️⃣</span><span>${T.flush_4}</span></div>
      <div class="note-item"><span class="note-icon">5️⃣</span><span>${T.flush_5}</span></div>
    </div>`;
}

function typeLabel(type) {
  return T['type_'+type] || type;
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
// Restore preferences before first render
const savedTheme = localStorage.getItem('nl-theme');
if (savedTheme === 'light') {
  document.body.classList.add('light-mode');
  document.getElementById('theme-btn').textContent = '☀️';
}

// Restore brand BEFORE initBrandNav() — single call, no duplicate
const savedBrand = localStorage.getItem('nl-brand');
if (savedBrand && BRANDS[savedBrand]) {
  currentBrand = savedBrand;
  document.getElementById('brandBadge').textContent = BRANDS[savedBrand].name;
}
initBrandNav(); // single call with correct currentBrand already set

// Restore phase
const savedPhase = localStorage.getItem('nl-phase');
if (savedPhase && ['grow','bloom','flush'].includes(savedPhase)) {
  currentPhase = savedPhase;
  ['grow','bloom','flush'].forEach(p => {
    const btn = document.getElementById('btn-'+p);
    btn.className = 'phase-btn';
    if (p === savedPhase) btn.classList.add('active-'+p);
  });
}

// Restore volume (validated)
const savedVolume = localStorage.getItem('nl-volume');
if (savedVolume) {
  const v = Math.max(1, parseFloat(savedVolume) || 10);
  document.getElementById('volumeInput').value = v;
}

// Build week options for the active brand+phase first
updateWeekSelect();

// Restore week — once, after options exist; updateWeekSelect already clamps if out of range
const savedWeek = localStorage.getItem('nl-week');
if (savedWeek) {
  const sel = document.getElementById('weekSelect');
  const lastOpt = sel.options[sel.options.length - 1];
  const maxWeek = lastOpt ? parseInt(lastOpt.value) : 1;
  const w = Math.max(1, Math.min(maxWeek, parseInt(savedWeek) || 1));
  sel.value = w;
  currentWeek = w;
}

// Restore language (triggers first render)
const savedLang = localStorage.getItem('nl-lang') || localStorage.getItem('dwc_lang') || 'de';
setLanguage(savedLang);
</script>
</body>
</html>
